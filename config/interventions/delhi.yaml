# Delhi GRAP intervention calendar, winter 2025-26 (spec 13, Intervention Ledger).
#
# REAL CAQM orders only. Every date is corroborated from a CAQM order PDF and/or an
# official government source; zero invented dates. Query strings are absent from
# these source URLs (static PDFs), so they are stored whole.
#
# GRAP stages are cumulative: invoking Stage-IV keeps Stages I-III in force. Each
# entry below is one ACTIVE PERIOD of a stage, with the invocation order that began
# it and the revocation that ended it. Times are day-granularity ("YYYY-MM-DD 00:00"
# IST = the order's effective day); the event-study runs on the daily weather-
# normalized series, so sub-day enforcement times are deliberately not invented.
#
# Consumer: vayu-models (deweathering event-study + placebo + GEMM health ledger).
# Schema shape agreed with models: {stage, start_ist, end_ist|null, source_url};
# revoked_url and confidence are additive.

city: delhi
season: "2025-26"
tz: Asia/Kolkata
grap_orders_index: https://caqm.nic.in/index1.aspx?lsid=4168&lev=2&lid=4171&langid=1
methodology_note: >-
  Stages nest (IV implies I-III). Sharp interventions for the event-study are the
  Stage-III (2025-11-11) and Stage-IV (2025-12-13, 2026-01-17) invocations. Later
  revocations without a located order PDF cite the CAQM orders index plus an
  official broadcaster and are tagged confidence: medium.

