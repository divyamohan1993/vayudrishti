# VayuDrishti static serving. Mirrors web/vercel.json: same security headers,
# same cache policy. Listens on 8080 for Cloud Run.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/css image/svg+xml application/geo+json text/plain;

    # Security headers (kept byte-identical with vercel.json).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://gibs.earthdata.nasa.gov https://gibs-a.earthdata.nasa.gov https://gibs-b.earthdata.nasa.gov https://gibs-c.earthdata.nasa.gov; connect-src 'self' https://gibs.earthdata.nasa.gov https://gibs-a.earthdata.nasa.gov https://gibs-b.earthdata.nasa.gov https://gibs-c.earthdata.nasa.gov; worker-src 'self' blob:; font-src 'self'; manifest-src 'self'; upgrade-insecure-requests" always;

    # Live data: short edge cache, long stale tolerance (same as Vercel path).
    location /data/ {
        add_header Cache-Control "public, max-age=0, s-maxage=300, stale-while-revalidate=3600" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Hashed build assets: immutable.
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # cleanUrls equivalent: /receipts resolves to receipts.html.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;
}
